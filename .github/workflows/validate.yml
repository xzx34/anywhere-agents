name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-validation:
    name: Repo Validation (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
        exclude:
          # Full Python matrix on Ubuntu; latest two on Windows/macOS to
          # keep total matrix reasonable (9 jobs instead of 15).
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run validation tests
        run: python -B -m unittest discover -s tests -p "test_*.py" -v

  docs-strict-build:
    name: Docs strict build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs and plugins
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict)
        run: python -m mkdocs build --strict --clean
